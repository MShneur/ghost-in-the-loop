<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock AI Chat — GITL e2e harness</title>
</head>
<body>
  <!-- Minimal mock of an AI chat surface.
       Selectors mirror the generic adapter shape so the userscript
       can find an input, a send button, and assistant messages. -->
  <main>
    <div class="conversation">
      <div class="message assistant" data-message-author-role="assistant">Test AI Message</div>
    </div>
    <div class="composer">
      <div
        id="prompt-textarea"
        class="ProseMirror"
        contenteditable="true"
        data-placeholder="Message..."
        role="textbox"></div>
      <button data-testid="send-button" aria-label="Send">Send</button>
    </div>
  </main>
</body>
</html>
